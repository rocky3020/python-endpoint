name: Keep Render Awake
on:
  schedule:
    - cron: '*/13 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        env:
          PING_URL: ${{ vars.PING_URL }}
        run: |
          if [ -z "$PING_URL" ]; then
            echo "PING_URL not set"
            exit 1
          fi
          curl -fsS -m 10 "$PING_URL" || true
